appId: ${APP_ID}
name: Launch login screen
tags:
  - smoke
---
- runFlow: ../../helpers/launch-app.yaml
- extendedWaitUntil:
    visible: "Continue with Cal.com"
    timeout: 15000
- assertVisible: "Data region"
- runFlow:
    when:
      platform: Android
    commands:
      - assertVisible: "United States"
- runFlow:
    when:
      platform: iOS
    commands:
      - assertVisible: "United States,.*"
- assertVisible: "Continue with Cal.com"
